# tools/ran.conf - editable knobs for the live 5G lab (sourced by tools/lab.sh
# and tools/lab_helpers.sh). This is DEMO/HARNESS config only. The router's
# own policy (rules, rate caps, quarantine) is edited live in the dashboard or
# with the control-pane verbs, not here.

# --- traffic generator (the ping in the 'traffic' pane) ---
PING_TARGET=8.8.8.8     # where the simulated UE pings
PING_INTERVAL=0.05      # seconds between packets (0.05 = 20 pkt/s; lets a 5pps cap show drops)
PING_SIZE=64            # ICMP payload bytes

# --- egress ---
EGRESS_IFACE=eth0       # the VM's real internet-facing interface (see: ip route get 8.8.8.8)

# --- optional policy applied automatically on launch (0 = leave unset) ---
DEFAULT_RATE_PPS=0          # e.g. 5 to cap the live subscriber at launch
DEFAULT_Q_THRESHOLD=0       # consecutive over-cap windows before quarantine
DEFAULT_Q_SECONDS=30        # quarantine hold duration
